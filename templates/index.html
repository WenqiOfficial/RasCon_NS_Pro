<!DOCTYPE html>
<html lang="zh-CN" data-theme="rascon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RasCon Ver.2.0 - Pro Controller</title>
    <!-- DaisyUI 5 -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css">
    <!-- Tailwind CSS v4 (Browser Runtime — 零构建) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 主题配置 -->
    <style type="text/tailwindcss">
    @theme {
        --font-sans: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ========== 自定义 DaisyUI 主题 — 精确匹配项目原色彩体系 ========== */
    [data-theme="rascon"] {
        color-scheme: dark;
        /* 背景层级 */
        --color-base-100: oklch(0.09 0 0);       /* #0d0d0d */
        --color-base-200: oklch(0.12 0 0);       /* #141414 */
        --color-base-300: oklch(0.14 0 0);       /* #1a1a1a */
        --color-base-content: oklch(0.9 0 0);    /* #e0e0e0 */
        /* 品牌色 */
        --color-primary: oklch(0.76 0.14 172);   /* #00d4aa */
        --color-primary-content: oklch(0.09 0 0);
        --color-secondary: oklch(0.68 0.13 172); /* #00b894 */
        --color-secondary-content: oklch(0.09 0 0);
        --color-accent: oklch(0.76 0.14 172);    /* #00d4aa */
        --color-accent-content: oklch(0.09 0 0);
        /* 中性色 */
        --color-neutral: oklch(0.16 0 0);        /* #1e1e1e */
        --color-neutral-content: oklch(0.9 0 0);
        /* 语义色 */
        --color-info: oklch(0.62 0.13 247);      /* #3498db */
        --color-info-content: oklch(0.95 0 0);
        --color-success: oklch(0.76 0.14 172);   /* #00d4aa */
        --color-success-content: oklch(0.09 0 0);
        --color-warning: oklch(0.74 0.16 70);    /* #f39c12 */
        --color-warning-content: oklch(0.09 0 0);
        --color-error: oklch(0.57 0.22 26);      /* #e74c3c */
        --color-error-content: oklch(0.95 0 0);
        /* 圆角 & 边框 */
        --radius-selector: 0.5rem;
        --radius-field: 0.375rem;
        --radius-box: 0.75rem;
        --size-selector: 0.25rem;
        --size-field: 0.25rem;
        --border: 1px;
        --depth: 0;
        --noise: 0;
        /* 补充色阶 — DaisyUI 5 未提供的细分层级 */
        --color-border: oklch(0.21 0 0);           /* #2a2a2a */
        --color-border-accent: oklch(0.25 0 0);    /* #333333 */
        --color-muted: oklch(0.60 0 0);             /* #888888 */
        --color-subtle: oklch(0.41 0 0);            /* #555555 */
    }
    </style>
    <!-- 组件样式 — 纯布局 & 动画，零颜色硬编码 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="min-h-screen p-5">
    <div class="max-w-[1440px] mx-auto">

        <!-- ====== Header ====== -->
        <header class="flex items-center justify-between px-6 py-4 bg-base-200 border border-base-300 rounded-box mb-5">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-xl">🎮</div>
                <div class="text-xl font-bold tracking-tight">RasCon <span class="text-primary">Pro</span></div>
            </div>
            <div class="flex items-center gap-2">
                <button type="button" onclick="connectBluetooth()" id="btn-connect" class="btn btn-primary btn-sm">连接</button>
                <button type="button" onclick="disconnectBluetooth()" id="btn-disconnect" class="btn btn-error btn-sm">断开</button>
                <div class="flex items-center gap-2 ml-2">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="text-xs text-base-content/50" id="status-text">未连接</span>
                </div>
            </div>
        </header>

        <!-- ====== Main Layout Grid ====== -->
        <div class="main-content grid grid-cols-[1fr_560px] gap-5 h-[calc(100vh-130px)] min-h-[500px]
                    max-[1200px]:grid-cols-1 max-[1200px]:h-auto">

            <!-- Left: Controller -->
            <div class="left-section flex flex-col h-full min-h-0 max-[1200px]:h-auto">
                <div class="card bg-base-200 border border-base-300 controller-panel">
                    <div class="flex items-center justify-between px-5 pt-4 pb-3 border-b border-base-300">
                        <h3 class="text-xs font-semibold uppercase tracking-wider">Pro Controller <span class="text-[11px] font-normal normal-case tracking-normal text-base-content/30">(WASD=左摇杆 方向键=右摇杆 空格=A 回车=B)</span></h3>
                        <button onclick="toggleFullscreen()" class="btn btn-ghost btn-xs" title="全屏模式">⛶</button>
                    </div>
                    <div class="controller-grid-container">
                        <div class="controller-grid">
                            <!-- 行1: 肩键 -->
                            <button data-btn="zl" class="btn-shoulder">ZL</button>
                            <button data-btn="l" class="btn-shoulder">L</button>
                            <i></i><i></i><i></i>
                            <button data-btn="r" class="btn-shoulder">R</button>
                            <button data-btn="zr" class="btn-shoulder">ZR</button>
                            <!-- 行2: +/- -->
                            <i></i><i></i>
                            <button data-btn="minus" class="btn-system">-</button>
                            <i></i>
                            <button data-btn="plus" class="btn-system">+</button>
                            <i></i><i></i>
                            <!-- 行3: 左摇杆上 / X -->
                            <i></i>
                            <button data-btn="ls up,100" class="btn-stick">↑</button>
                            <i></i><i></i><i></i>
                            <button data-btn="x" class="btn-action">X</button>
                            <i></i>
                            <!-- 行4: 左摇杆 / Y/A -->
                            <button data-btn="ls left,100" class="btn-stick">←</button>
                            <button data-btn="l_stick" class="btn-stick">●</button>
                            <button data-btn="ls right,100" class="btn-stick">→</button>
                            <i></i>
                            <button data-btn="y" class="btn-action">Y</button>
                            <i></i>
                            <button data-btn="a" class="btn-action">A</button>
                            <!-- 行5: 左摇杆下 / B -->
                            <i></i>
                            <button data-btn="ls down,100" class="btn-stick">↓</button>
                            <i></i><i></i><i></i>
                            <button data-btn="b" class="btn-action">B</button>
                            <i></i>
                            <!-- 行6: 方向键上 / 右摇杆上 -->
                            <i></i>
                            <button data-btn="up" class="btn-dpad">▲</button>
                            <i></i><i></i><i></i>
                            <button data-btn="rs up,100" class="btn-stick">↑</button>
                            <i></i>
                            <!-- 行7: 方向键 / 右摇杆 -->
                            <button data-btn="left" class="btn-dpad">◀</button>
                            <i></i>
                            <button data-btn="right" class="btn-dpad">▶</button>
                            <i></i>
                            <button data-btn="rs left,100" class="btn-stick">←</button>
                            <button data-btn="r_stick" class="btn-stick">●</button>
                            <button data-btn="rs right,100" class="btn-stick">→</button>
                            <!-- 行8: 方向键下 / 右摇杆下 -->
                            <i></i>
                            <button data-btn="down" class="btn-dpad">▼</button>
                            <i></i><i></i><i></i>
                            <button data-btn="rs down,100" class="btn-stick">↓</button>
                            <i></i>
                            <!-- 行9: Capture / Home -->
                            <i></i><i></i>
                            <button data-btn="capture" class="btn-special">📷</button>
                            <i></i>
                            <button data-btn="home" class="btn-special">🏠</button>
                            <i></i><i></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Sidebar (Amiibo & Script) -->
            <div class="right-section flex flex-col gap-3 h-full min-h-0 overflow-hidden
                        max-[1200px]:h-auto">
                <!-- Amiibo Panel (Tabbed) -->
                <div class="card bg-base-200 border border-base-300 p-4 sidebar-panel-amiibo">
                    <div role="tablist" class="tabs tabs-box tabs-sm mb-3">
                        <button role="tab" class="tab tab-active" id="tab-library" onclick="switchAmiiboTab('library')">📦 本地库</button>
                        <button role="tab" class="tab" id="tab-subscription" onclick="switchAmiiboTab('subscription')">🌐 在线订阅</button>
                    </div>

                    <!-- View: Library -->
                    <div id="amiibo-library-view" class="flex flex-col flex-1 min-h-0 overflow-hidden">
                        <div class="flex gap-1.5 mb-2 flex-wrap">
                            <input type="text" id="amiibo-search-input" class="input input-bordered input-sm flex-1 min-w-[120px]" placeholder="🔍 搜索..." onkeyup="searchAmiibo(this.value)">
                            <button onclick="refreshAmiiboList()" class="btn btn-ghost btn-sm" title="刷新">🔄</button>
                        </div>
                        <div class="flex gap-1.5 mb-2 flex-wrap">
                            <button onclick="document.getElementById('amiibo-file').click()" class="btn btn-primary btn-sm">➕ 上传</button>
                            <input type="file" id="amiibo-file" accept=".bin" multiple hidden onchange="uploadAmiibo()">
                            <button onclick="toggleGroupMode()" id="btn-group-mode" class="btn btn-ghost btn-sm">📁 分组</button>
                            <button onclick="collapseAllGroups()" class="btn btn-ghost btn-sm" title="全部折叠" id="btn-collapse-all">⊟</button>
                            <button onclick="expandAllGroups()" class="btn btn-ghost btn-sm" title="全部展开" id="btn-expand-all">⊞</button>
                            <button onclick="updateAmiiboDatabase()" class="btn btn-ghost btn-sm">☁️ 更新DB</button>
                        </div>
                        <div class="amiibo-content-split">
                            <!-- 左侧: 列表 -->
                            <div class="amiibo-list-panel">
                                <div id="amiibo-list" class="amiibo-simple-list">
                                    <div class="empty-state">正在加载...</div>
                                </div>
                                <div id="current-amiibo-status" class="current-amiibo-status hide">
                                    <span class="label">使用中:</span>
                                    <span id="current-amiibo-name" class="current-name"></span>
                                    <button onclick="removeCurrentAmiibo()" class="btn btn-error btn-xs">移除</button>
                                </div>
                            </div>
                            <!-- 右侧: 详情面板 -->
                            <div class="amiibo-detail-panel" id="amiibo-detail-panel">
                                <div class="detail-empty" id="detail-empty">
                                    <div class="icon">📋</div>
                                    <div>选择一个 Amiibo 查看详情</div>
                                </div>
                                <div id="detail-content" class="detail-content-inner">
                                    <div class="detail-header">
                                        <div class="detail-image" id="detail-image">
                                            <span class="placeholder">?</span>
                                        </div>
                                        <div class="detail-meta">
                                            <div class="name" id="detail-name">-</div>
                                            <div class="sub" id="detail-sub">-</div>
                                            <div class="tags" id="detail-tags"></div>
                                        </div>
                                    </div>
                                    <div class="detail-actions">
                                        <button class="btn btn-primary btn-sm" onclick="scanSelectedAmiibo()" title="扫描/使用">⚡ 使用</button>
                                        <button class="btn btn-ghost btn-sm" onclick="restoreSelectedAmiibo()" id="detail-btn-restore" title="恢复到原始版本">↺ 重置</button>
                                        <button class="btn btn-error btn-sm" onclick="deleteSelectedAmiibo()" title="删除">🗑 删除</button>
                                    </div>
                                    <div class="detail-versions" id="detail-versions">
                                        <div class="detail-versions-title">📦 版本历史</div>
                                        <div id="version-list">
                                            <div class="version-empty">无版本记录</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- View: Subscription -->
                    <div id="amiibo-subscription-view" class="hidden flex-col flex-1 min-h-0 overflow-hidden">
                        <div class="flex gap-1.5 mb-2">
                            <input type="text" id="repo-url-input" class="input input-bordered input-sm flex-1" placeholder="GitHub: User/Repo">
                            <button onclick="fetchRepoTree()" class="btn btn-primary btn-sm">获取</button>
                        </div>
                        <div class="hidden flex gap-1.5 mb-2" id="repo-toolbar">
                            <input type="text" id="repo-search-input" class="input input-bordered input-sm flex-1" placeholder="🔍 筛选文件..." onkeyup="filterRepoFiles(this.value)">
                            <button onclick="collapseAllRepoGroups()" class="btn btn-ghost btn-sm" title="全部折叠">⊟</button>
                            <button onclick="expandAllRepoGroups()" class="btn btn-ghost btn-sm" title="全部展开">⊞</button>
                        </div>
                        <div id="repo-content" class="flex-1 overflow-y-auto border border-base-300 rounded-lg bg-base-300 p-2">
                            <div class="empty-state">输入 GitHub 仓库地址<br><small>例如: Falco/amiibo</small></div>
                        </div>
                    </div>
                </div>

                <!-- Script Panel -->
                <div class="card bg-base-200 border border-base-300 p-4 sidebar-panel-script">
                    <div class="flex items-center gap-2 mb-2">
                        <h3 class="text-xs font-semibold uppercase tracking-wider">📜 脚本</h3>
                        <span class="text-[10px] text-base-content/30">支持宏命令</span>
                    </div>
                    <div id="script-form" class="flex flex-col flex-1 gap-2">
                        <textarea id="script-area" class="textarea textarea-bordered flex-1 min-h-[80px] resize-none font-mono text-xs leading-relaxed" spellcheck="false" placeholder="# 按A键&#10;a&#10;# 等待1秒&#10;wait 1000&#10;# 左摇杆推左&#10;ls left,100"></textarea>
                        <div class="flex gap-1.5">
                            <button type="button" id="script-toggle-btn" onclick="toggleScript()" class="btn btn-primary btn-sm flex-1">▶ 运行</button>
                            <button type="button" onclick="document.getElementById('script-area').value=''" class="btn btn-ghost btn-sm">🗑</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center p-5 mt-5 text-base-content/40 text-[11px] tracking-wider">
            &copy; 2020-2026 RasCon - Python 3.11+ 适配版 | Amiibo 库集成版
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast toast-end toast-bottom z-50" id="toast-container"></div>

    <!-- 确认对话框 (DaisyUI Modal — 替代原生 confirm()) -->
    <dialog id="confirm-modal" class="modal">
        <div class="modal-box">
            <p id="confirm-message" class="py-4 text-sm leading-relaxed whitespace-pre-line"></p>
            <div class="modal-action">
                <button id="confirm-cancel" class="btn btn-ghost btn-sm">取消</button>
                <button id="confirm-ok" class="btn btn-primary btn-sm">确定</button>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop"><button type="button">close</button></form>
    </dialog>

    <!-- 服务端数据注入 -->
    <script>
        window.APP_CONFIG = {
            initialScript: {{ script | tojson }}
        };
    </script>
    <script src="/static/js/app.js"></script>
</body>
</html>
