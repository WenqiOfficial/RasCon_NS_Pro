<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RasCon Ver.2.0 - Pro Controller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px;
            background: rgba(255, 165, 0, 0.9);
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.3);
        }
        
        header h1 {
            color: #1a1a2e;
            font-size: 2em;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 200px 1fr 350px;
            gap: 20px;
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        
        .panel h3 {
            color: #ffa500;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 165, 0, 0.3);
        }
        
        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .sidebar button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(145deg, #ffa500, #ff8c00);
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .sidebar button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.4);
        }
        
        .sidebar button.danger {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
        }
        
        /* 控制器部分 */
        .controller-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .controller-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }
        
        .controller-grid form {
            display: contents;
        }
        
        .controller-grid button {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 14px;
        }
        
        .controller-grid button:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        .controller-grid button:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        /* 按钮颜色分类 */
        .btn-shoulder {
            background: linear-gradient(145deg, #607d8b, #455a64);
            color: white;
        }
        
        .btn-action {
            background: linear-gradient(145deg, #2196F3, #1976D2);
            color: white;
        }
        
        .btn-dpad {
            background: linear-gradient(145deg, #333333, #222222);
            color: white;
        }
        
        .btn-stick {
            background: linear-gradient(145deg, #9c27b0, #7b1fa2);
            color: white;
        }
        
        .btn-system {
            background: linear-gradient(145deg, #ff5722, #e64a19);
            color: white;
        }
        
        .btn-special {
            background: linear-gradient(145deg, #4CAF50, #388E3C);
            color: white;
        }
        
        .btn-empty {
            background: transparent;
            cursor: default;
        }
        
        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .script-area {
            flex: 1;
        }
        
        .script-area textarea {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 165, 0, 0.3);
            border-radius: 8px;
            color: #fff;
            padding: 10px;
            font-family: 'Consolas', monospace;
            resize: vertical;
        }
        
        .script-area textarea:focus {
            outline: none;
            border-color: #ffa500;
        }
        
        .script-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .script-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-run {
            background: linear-gradient(145deg, #4CAF50, #388E3C);
            color: white;
        }
        
        .btn-stop {
            background: linear-gradient(145deg, #f44336, #d32f2f);
            color: white;
        }
        
        /* Amiibo 部分 */
        .amiibo-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 15px;
        }
        
        .amiibo-section h4 {
            color: #ffa500;
            margin-bottom: 10px;
        }
        
        .amiibo-status {
            padding: 8px;
            background: rgba(76, 175, 80, 0.2);
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .file-upload {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .file-upload input[type="file"] {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px dashed rgba(255, 165, 0, 0.5);
            border-radius: 8px;
            color: #fff;
        }
        
        .amiibo-buttons {
            display: flex;
            gap: 10px;
        }
        
        .amiibo-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .btn-upload {
            background: linear-gradient(145deg, #2196F3, #1976D2);
            color: white;
        }
        
        .btn-remove {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: white;
        }
        
        .btn-clean {
            background: linear-gradient(145deg, #9e9e9e, #757575);
            color: white;
        }
        
        /* 消息区域 */
        .message-area {
            margin-top: 20px;
        }
        
        .message-area textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #aaa;
            padding: 10px;
            font-family: 'Consolas', monospace;
            resize: none;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .sidebar > * {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 RasCon Ver.2.0 - Pro Controller</h1>
        </header>
        
        <div class="main-content">
            <!-- 左侧边栏 -->
            <div class="panel sidebar">
                <h3>状态</h3>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span>已连接</span>
                </div>
                
                <h3>蓝牙</h3>
                <form action="/bluez" method="POST">
                    <button name="btn" value="ON">连接</button>
                </form>
                <form action="/bluez" method="POST">
                    <button name="btn" value="OFF" class="danger">断开</button>
                </form>
                
                <h3>系统</h3>
                <form action="/raspi" method="POST">
                    <button name="btn" value="sudo reboot" class="danger">重启</button>
                </form>
                <form action="/raspi" method="POST">
                    <button name="btn" value="sudo shutdown" class="danger">关机</button>
                </form>
                
                <form action="/amiibos">
                    <button>批量刷Amiibo</button>
                </form>
            </div>
            
            <!-- 控制器主区域 -->
            <div class="controller-section panel">
                <h3>Pro Controller</h3>
                <div class="controller-grid">
                    <!-- 第1行: 肩键 -->
                    <form action="/btn" method="POST"><button name="btn" value="zl" class="btn-shoulder">ZL</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="l" class="btn-shoulder">L</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="r" class="btn-shoulder">R</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="zr" class="btn-shoulder">ZR</button></form>
                    
                    <!-- 第2行: +/- 按钮 -->
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="minus" class="btn-system">-</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="plus" class="btn-system">+</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    
                    <!-- 第3行: 左摇杆上 / X -->
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="ls up,100" class="btn-stick">↑</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="x" class="btn-action">X</button></form>
                    <button class="btn-empty" disabled></button>
                    
                    <!-- 第4行: 左摇杆左/按下/右 / Y / A -->
                    <form action="/btn" method="POST"><button name="btn" value="ls left,100" class="btn-stick">←</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="l_stick" class="btn-stick">●</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="ls right,100" class="btn-stick">→</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="y" class="btn-action">Y</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="a" class="btn-action">A</button></form>
                    
                    <!-- 第5行: 左摇杆下 / B -->
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="ls down,100" class="btn-stick">↓</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="b" class="btn-action">B</button></form>
                    <button class="btn-empty" disabled></button>
                    
                    <!-- 第6行: 方向键上 / 右摇杆上 -->
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="up" class="btn-dpad">▲</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="rs up,100" class="btn-stick">↑</button></form>
                    <button class="btn-empty" disabled></button>
                    
                    <!-- 第7行: 方向键左/右 / 右摇杆左/按下/右 -->
                    <form action="/btn" method="POST"><button name="btn" value="left" class="btn-dpad">◀</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="right" class="btn-dpad">▶</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="rs left,100" class="btn-stick">←</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="r_stick" class="btn-stick">●</button></form>
                    <form action="/btn" method="POST"><button name="btn" value="rs right,100" class="btn-stick">→</button></form>
                    
                    <!-- 第8行: 方向键下 / 右摇杆下 -->
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="down" class="btn-dpad">▼</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="rs down,100" class="btn-stick">↓</button></form>
                    <button class="btn-empty" disabled></button>
                    
                    <!-- 第9行: Capture / Home -->
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="capture" class="btn-special">📷</button></form>
                    <button class="btn-empty" disabled></button>
                    <form action="/btn" method="POST"><button name="btn" value="home" class="btn-special">🏠</button></form>
                    <button class="btn-empty" disabled></button>
                    <button class="btn-empty" disabled></button>
                </div>
                
                <div class="message-area">
                    <h4>消息日志</h4>
                    <textarea readonly>{{msg}}</textarea>
                </div>
            </div>
            
            <!-- 右侧面板 -->
            <div class="right-panel">
                <div class="panel script-area">
                    <h3>脚本</h3>
                    <form action="/script/run" method="POST">
                        <textarea name="script" placeholder="# 在这里输入脚本命令...
# 示例:
# a          - 按A键
# wait 1000  - 等待1秒
# for 5      - 循环5次
#   b
# next">{{script}}</textarea>
                        <div class="script-buttons">
                            <button type="submit" class="btn-run">▶ 运行</button>
                        </div>
                    </form>
                    <form action="/script/stop" method="POST">
                        <div class="script-buttons">
                            <button type="submit" class="btn-stop">⏹ 停止</button>
                        </div>
                    </form>
                </div>
                
                <div class="panel amiibo-section">
                    <h3>Amiibo</h3>
                    {% if amiibo %}
                    <div class="amiibo-status">{{ amiibo }}</div>
                    {% endif %}
                    <form action="/amiibo/upload" method="POST" enctype="multipart/form-data" class="file-upload">
                        <input type="file" name="file" accept=".bin" />
                        <div class="amiibo-buttons">
                            <button type="submit" class="btn-upload">上传</button>
                        </div>
                    </form>
                    <div class="amiibo-buttons" style="margin-top: 10px;">
                        <form action="/btn" method="POST" style="flex: 1;">
                            <button name="btn" value="amiibo remove" class="btn-remove" style="width: 100%;">移除</button>
                        </form>
                        <form action="/btn" method="POST" style="flex: 1;">
                            <button name="btn" value="amiibo clean" class="btn-clean" style="width: 100%;">清空</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2020-2026 RasCon - Python 3.11+ 适配版</p>
        </footer>
    </div>
</body>
</html>
