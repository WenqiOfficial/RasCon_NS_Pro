<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RasCon Ver.2.0 - Pro Controller</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-card: #1e1e1e;
            --border-color: #2a2a2a;
            --border-accent: #333;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --text-muted: #555;
            --accent-primary: #00d4aa;
            --accent-secondary: #00b894;
            --accent-hover: #00e6b8;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #00d4aa;
            --info: #3498db;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.5;
        }
        
        .container {
            max-width: 1440px;
            margin: 0 auto;
        }
        
        /* Header - 简约风格 */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 1.4em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .logo-text span {
            color: var(--accent-primary);
        }
        
        .header-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        /* 主布局 - 桌面：控制器左侧(宽)，侧边栏右侧(窄) */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            height: calc(100vh - 130px);
            min-height: 500px;
        }
        
        .left-section {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
            min-height: 0;
            overflow: hidden;
        }

        /* 响应式 - 竖屏/移动端：控制器 -> Amiibo -> 脚本 */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }
            .left-section {
                height: auto;
                min-height: auto;
            }
            .right-section {
                height: auto;
            }
            .sidebar-panel-amiibo {
                min-height: 350px;
            }
            .sidebar-panel-script {
                order: 10;
            }
            .controller-grid {
                width: 100%;
                max-width: 500px;
            }
        }
        
        /* 控制器容器 - 响应式 */
        .controller-grid-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 20px;
            overflow: auto;
        }

        /* 控制器面板 */
        .controller-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            flex: 1;
        }

        /* 全屏模式 */
        .fullscreen-active .main-content {
            display: block;
        }
        
        .fullscreen-active .right-section {
            display: none;
        }
        
        .fullscreen-active header,
        .fullscreen-active footer {
            display: none;
        }

        .fullscreen-active .left-section {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
            background: var(--bg-primary);
            padding: 20px;
        }
        
        .fullscreen-active .left-section .panel {
            height: 100%;
            border: none;
            max-width: 800px;
            margin: 0 auto;
        }

        
        /* 面板通用样式 */
        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .panel h3 {
            color: var(--text-primary);
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .panel h3 .key-hint {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            text-transform: none;
            letter-spacing: 0;
        }
        
        .panel-badge {
            font-size: 10px;
            padding: 3px 8px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-accent);
            border-radius: 4px;
            color: var(--text-secondary);
        }
        
        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.5);
        }
        
        .status-dot.connected {
            background: var(--accent-primary);
            box-shadow: 0 0 8px rgba(0, 212, 170, 0.5);
        }
        
        .status-text {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 8px 14px;
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .btn:hover {
            background: var(--bg-card);
            border-color: var(--text-muted);
        }
        
        .btn-sm {
            padding: 4px 8px;
            font-size: 11px;
            height: auto;
        }

        .btn-lg {
            padding: 12px 20px;
            font-size: 14px;
        }
        
        .btn-accent {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
        }
        
        .btn-accent:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }
        
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }
        
        /* 控制器网格 - 响应式 */
        .controller-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(40px, 70px));
            gap: 8px;
            padding: 20px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: fit-content;
        }
        
        .controller-grid button {
            width: 100%;
            min-width: 40px;
            height: 48px;
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 13px;
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .controller-grid button:hover:not(:disabled) {
            border-color: var(--accent-primary);
            background: var(--bg-card);
            filter: brightness(1.1);
        }
        
        .controller-grid button:active:not(:disabled) {
            filter: brightness(0.8);
        }
        
        /* 按钮分类颜色 - 简约版 */
        .btn-shoulder {
            background: linear-gradient(180deg, #2d2d2d 0%, #252525 100%);
            border-color: #3a3a3a;
        }
        
        .btn-action {
            background: linear-gradient(180deg, #1a3a5c 0%, #152d47 100%);
            border-color: #2a5080;
            color: #6ab0ff;
        }
        
        .btn-dpad {
            background: linear-gradient(180deg, #1f1f1f 0%, #181818 100%);
            border-color: #2a2a2a;
        }
        
        .btn-stick {
            background: linear-gradient(180deg, #2d1f3d 0%, #251a35 100%);
            border-color: #4a3060;
            color: #b388ff;
        }
        
        .btn-system {
            background: linear-gradient(180deg, #3d2a1a 0%, #352315 100%);
            border-color: #5a4020;
            color: #ffb74d;
        }
        
        .btn-special {
            background: linear-gradient(180deg, #1a3d2a 0%, #153525 100%);
            border-color: #2a5a40;
            color: var(--accent-primary);
        }
        
        /* 占位格子 */
        .controller-grid i {
            display: block;
            min-height: 44px; /* Fix grid row collapse for empty cells */
        }
        
        .btn-pressed {
            background-color: var(--accent-primary) !important;
            color: var(--bg-primary) !important;
            border-color: var(--accent-primary) !important;
            filter: brightness(1.2) !important;
        }
        
        /* 脚本区域 - 调整为全高 */
        .script-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .script-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            height: 100%;
        }

        .script-container textarea {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
        }
        
        /* 脚本区域 */
        .script-row {
            display: flex;
            gap: 12px;
        }
        
        .script-row form {
            display: flex;
            gap: 10px;
        }
        
        .script-row form:first-child {
            flex: 1;
        }
        
        .script-row textarea {
            flex: 1;
            height: 80px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 12px;
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
            resize: vertical;
            transition: border-color 0.2s;
        }
        
        .script-row textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .script-row textarea::placeholder {
            color: var(--text-muted);
        }
        
        .script-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .btn-run {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: var(--bg-primary);
            font-weight: 600;
        }
        
        .btn-run:hover {
            background: var(--accent-hover);
        }
        
        .btn-stop {
            background: transparent;
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .btn-stop:hover {
            background: var(--danger);
            color: white;
        }
        
        /* 右侧：Amiibo 库 */
        .amiibo-library {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 120px);
            max-height: 720px;
        }

        /* 侧边栏面板样式 */
        .sidebar-panel-amiibo {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 300px;
            overflow: hidden;
        }

        .sidebar-panel-script {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            min-height: 180px;
        }

        /* Amiibo 视图 */
        #amiibo-library-view,
        #amiibo-subscription-view {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        #amiibo-subscription-view {
            display: none;
        }

        .amiibo-simple-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 4px;
        }

        .amiibo-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .amiibo-search-input {
            flex: 1;
            min-width: 120px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 13px;
        }

        .amiibo-search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .current-amiibo-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 6px;
            font-size: 12px;
        }

        .current-amiibo-status .label {
            color: var(--accent-primary);
        }

        .current-amiibo-status .current-name {
            font-weight: bold;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #repo-content {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-tertiary);
            padding: 8px;
        }

        /* 脚本区域 */
        #script-form {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }

        #script-area {
            flex: 1;
            min-height: 80px;
            padding: 10px;
            resize: none;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 6px;
        }

        #script-area:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .script-actions {
            display: flex;
            gap: 6px;
        }

        .script-header {
            border: none !important;
            margin-bottom: 8px !important;
            padding-bottom: 0 !important;
        }

        .script-header h3 {
            font-size: 13px;
        }

        .script-header small {
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 10px;
        }

        .btn-flex {
            flex: 1;
        }

        /* 空状态样式 */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 15px;
            font-size: 13px;
        }

        .empty-state small {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.7;
        }
        
        /* Amiibo 标签页 - 现代风格 */
        .amiibo-tabs {
            display: flex;
            gap: 2px;
            margin-bottom: 12px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 8px;
        }
        
        .amiibo-tabs button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .amiibo-tabs button:hover {
            color: var(--text-secondary);
            background: rgba(255,255,255,0.03);
        }
        
        .amiibo-tabs button.active {
            background: var(--bg-card);
            color: var(--accent-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* Amiibo 搜索栏 */
        .amiibo-search {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .amiibo-search input {
            flex: 1;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 13px;
            transition: border-color 0.2s;
        }
        
        .amiibo-search input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .amiibo-search input::placeholder {
            color: var(--text-muted);
        }
        
        .amiibo-search button {
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .amiibo-search button:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        
        /* Amiibo 内容区 */
        .amiibo-content {
            flex: 1;
            display: flex;
            gap: 12px;
            overflow: hidden;
        }
        
        /* 树状导航 */
        .amiibo-tree {
            width: 130px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            overflow-y: auto;
        }
        
        .tree-node {
            cursor: pointer;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 11px;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        
        .tree-node:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .tree-node.active {
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent-primary);
            border: 1px solid rgba(0, 212, 170, 0.3);
        }
        
        .tree-node .count {
            font-size: 10px;
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 10px;
            color: var(--text-muted);
        }
        
        /* Amiibo 列表 */
        .amiibo-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .amiibo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .amiibo-item:hover {
            background: var(--bg-card);
            border-color: var(--border-accent);
            transform: translateX(4px);
        }
        
        .amiibo-item.selected {
            border-color: var(--accent-primary);
            background: rgba(0, 212, 170, 0.05);
        }
        
        .amiibo-icon {
            width: 42px;
            height: 42px;
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-muted);
        }
        
        .amiibo-icon img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 6px;
        }
        
        .amiibo-info {
            flex: 1;
            min-width: 0;
        }
        
        .amiibo-info .name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }
        
        .amiibo-info .meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .amiibo-actions {
            display: flex;
            gap: 6px;
        }
        
        .amiibo-actions button {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border-accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .amiibo-actions .btn-scan {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        
        .amiibo-actions .btn-scan:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }
        
        .amiibo-actions .btn-restore {
            border-color: var(--info);
            color: var(--info);
        }
        
        .amiibo-actions .btn-restore:hover {
            background: var(--info);
            color: white;
        }
        
        .amiibo-actions .btn-restore {
            border-color: var(--info);
            color: var(--info);
        }
        
        .amiibo-actions .btn-restore:hover {
            background: var(--info);
            color: white;
        }

        .amiibo-actions .btn-delete {
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .amiibo-actions .btn-delete:hover {
            background: var(--danger);
            color: white;
        }
        
        /* 底部操作栏 */
        .amiibo-footer {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .amiibo-upload {
            display: flex;
            gap: 8px;
        }
        
        .amiibo-upload input[type="file"] {
            flex: 1;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px dashed var(--border-accent);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .amiibo-upload input[type="file"]:hover {
            border-color: var(--accent-primary);
        }
        
        .amiibo-upload button {
            padding: 10px 16px;
            background: var(--accent-primary);
            border: none;
            border-radius: 6px;
            color: var(--bg-primary);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .amiibo-upload button:hover {
            background: var(--accent-hover);
        }
        
        /* 当前 Amiibo 状态 */
        .current-amiibo-status {
            margin-top: 10px;
            padding: 12px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .current-amiibo-status .label {
            font-size: 12px;
            color: var(--accent-primary);
        }
        
        .current-amiibo-status button {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--warning);
            border-radius: 4px;
            color: var(--warning);
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        
        .current-amiibo-status button:hover {
            background: var(--warning);
            color: var(--bg-primary);
        }
        
        /* 外部库面板 */
        .external-library {
            display: none;
        }
        
        .external-library.active {
            display: flex;
            flex-direction: column;
        }
        
        .external-path {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .external-path input {
            flex: 1;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 12px;
        }
        
        .external-path input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .external-tree {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
        }
        
        .external-series {
            margin-bottom: 4px;
        }
        
        .external-series-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .external-series-header:hover {
            border-color: var(--border-accent);
        }
        
        .external-series-header .toggle {
            font-size: 10px;
            color: var(--text-muted);
        }
        
        .external-series-header .name {
            flex: 1;
            font-size: 12px;
            font-weight: 500;
        }
        
        .external-series-header .count {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .external-series-header .btn-import-all {
            padding: 4px 10px;
            background: var(--accent-primary);
            border: none;
            border-radius: 4px;
            color: var(--bg-primary);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .external-series-header .btn-import-all:hover {
            background: var(--accent-hover);
        }
        
        .external-files {
            display: none;
            padding-left: 20px;
            padding-top: 6px;
        }
        
        .external-files.expanded {
            display: block;
        }
        
        .external-file {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        
        .external-file:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        
        .external-file .name {
            flex: 1;
        }
        
        .external-file .btn-import {
            padding: 3px 8px;
            background: transparent;
            border: 1px solid var(--info);
            border-radius: 4px;
            color: var(--info);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .external-file .btn-import:hover {
            background: var(--info);
            color: white;
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            font-size: 13px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            border-left: 3px solid var(--accent-primary);
        }
        
        .toast.error {
            border-left: 3px solid var(--danger);
        }
        
        .toast.info {
            border-left: 3px solid var(--info);
        }
        
        /* 空状态和提示 */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 30px;
        }
        
        .error-state {
            color: var(--danger);
            padding: 20px;
        }
        
        .hide {
            display: none !important;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        
        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        footer a:hover {
            color: var(--accent-primary);
        }
        
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-accent);
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🎮</div>
                <div class="logo-text">RasCon <span>Pro</span></div>
            </div>
            <div class="quick-actions">
                <form action="/bluez" method="POST">
                    <button type="submit" name="btn" value="ON" class="btn btn-accent">连接</button>
                </form>
                <form action="/bluez" method="POST">
                    <button type="submit" name="btn" value="OFF" class="btn btn-danger">断开</button>
                </form>
                <div class="status-indicator">
                    <div class="status-dot" id="status-dot"></div>
                    <span class="status-text" id="status-text">未连接</span>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <!-- 左侧：控制器 -->
            <div class="left-section controller-section">
                
                <!-- 控制器 -->
                <div class="panel controller-panel">
                    <div class="panel-header">
                        <h3>Pro Controller <span class="key-hint">(WASD=左摇杆 方向键=右摇杆 空格=A 回车=B)</span></h3>
                        <div class="window-controls">
                            <button onclick="toggleFullscreen()" class="btn btn-sm" title="全屏模式">⛶</button>
                        </div>
                    </div>
                    <div class="controller-grid-container">
                        <div class="controller-grid">
                            <!-- 行1: 肩键 -->
                        <button data-btn="zl" class="btn-shoulder">ZL</button>
                        <button data-btn="l" class="btn-shoulder">L</button>
                        <i></i><i></i><i></i>
                        <button data-btn="r" class="btn-shoulder">R</button>
                        <button data-btn="zr" class="btn-shoulder">ZR</button>
                        <!-- 行2: +/- -->
                        <i></i><i></i>
                        <button data-btn="minus" class="btn-system">-</button>
                        <i></i>
                        <button data-btn="plus" class="btn-system">+</button>
                        <i></i><i></i>
                        <!-- 行3: 左摇杆上 / X -->
                        <i></i>
                        <button data-btn="ls up,100" class="btn-stick">↑</button>
                        <i></i><i></i><i></i>
                        <button data-btn="x" class="btn-action">X</button>
                        <i></i>
                        <!-- 行4: 左摇杆 / Y/A -->
                        <button data-btn="ls left,100" class="btn-stick">←</button>
                        <button data-btn="l_stick" class="btn-stick">●</button>
                        <button data-btn="ls right,100" class="btn-stick">→</button>
                        <i></i>
                        <button data-btn="y" class="btn-action">Y</button>
                        <i></i>
                        <button data-btn="a" class="btn-action">A</button>
                        <!-- 行5: 左摇杆下 / B -->
                        <i></i>
                        <button data-btn="ls down,100" class="btn-stick">↓</button>
                        <i></i><i></i><i></i>
                        <button data-btn="b" class="btn-action">B</button>
                        <i></i>
                        <!-- 行6: 方向键上 / 右摇杆上 -->
                        <i></i>
                        <button data-btn="up" class="btn-dpad">▲</button>
                        <i></i><i></i><i></i>
                        <button data-btn="rs up,100" class="btn-stick">↑</button>
                        <i></i>
                        <!-- 行7: 方向键 / 右摇杆 -->
                        <button data-btn="left" class="btn-dpad">◀</button>
                        <i></i>
                        <button data-btn="right" class="btn-dpad">▶</button>
                        <i></i>
                        <button data-btn="rs left,100" class="btn-stick">←</button>
                        <button data-btn="r_stick" class="btn-stick">●</button>
                        <button data-btn="rs right,100" class="btn-stick">→</button>
                        <!-- 行8: 方向键下 / 右摇杆下 -->
                        <i></i>
                        <button data-btn="down" class="btn-dpad">▼</button>
                        <i></i><i></i><i></i>
                        <button data-btn="rs down,100" class="btn-stick">↓</button>
                        <i></i>
                        <!-- 行9: Capture / Home -->
                            <i></i><i></i>
                            <button data-btn="capture" class="btn-special">📷</button>
                            <i></i>
                            <button data-btn="home" class="btn-special">🏠</button>
                            <i></i><i></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right Section: Sidebar (Amiibo & Script) -->
            <div class="right-section sidebar-section">
                <!-- Amiibo Panel (Tabbed) -->
                <div class="panel sidebar-panel-amiibo">
                    <div class="amiibo-tabs">
                        <button class="active" id="tab-library" onclick="switchAmiiboTab('library')">📦 本地库</button>
                        <button id="tab-subscription" onclick="switchAmiiboTab('subscription')">🌐 在线订阅</button>
                    </div>
                    
                    <!-- View: Library -->
                    <div id="amiibo-library-view">
                        <div class="amiibo-toolbar">
                            <input type="text" id="amiibo-search-input" class="amiibo-search-input" placeholder="🔍 搜索..." onkeyup="searchAmiibo(this.value)">
                            <button onclick="refreshAmiiboList()" class="btn btn-sm" title="刷新">🔄</button>
                        </div>
                        <div class="amiibo-toolbar">
                            <button onclick="document.getElementById('amiibo-file').click()" class="btn btn-accent btn-sm">➕ 上传</button>
                            <input type="file" id="amiibo-file" accept=".bin" multiple hidden onchange="uploadAmiibo()">
                            <button onclick="toggleGroupMode()" id="btn-group-mode" class="btn btn-sm">📁 分组</button>
                            <button onclick="updateAmiiboDatabase()" class="btn btn-sm">☁️ 更新DB</button>
                        </div>
                        <div id="amiibo-list" class="amiibo-simple-list">
                            <div class="empty-state">正在加载...</div>
                        </div>
                        <div id="current-amiibo-status" class="current-amiibo-status hide">
                            <span class="label">使用中:</span>
                            <span id="current-amiibo-name" class="current-name"></span>
                            <button onclick="removeCurrentAmiibo()" class="btn btn-danger btn-sm">移除</button>
                        </div>
                    </div>
                    
                    <!-- View: Subscription -->
                    <div id="amiibo-subscription-view">
                        <div class="amiibo-toolbar">
                            <input type="text" id="repo-url-input" class="amiibo-search-input" placeholder="GitHub: User/Repo">
                            <button onclick="fetchRepoTree()" class="btn btn-accent btn-sm">获取</button>
                        </div>
                        <div id="repo-content">
                            <div class="empty-state">输入 GitHub 仓库地址<br><small>例如: Falco/amiibo</small></div>
                        </div>
                    </div>
                </div>
                
                <!-- Script Panel -->
                <div class="panel sidebar-panel-script">
                    <div class="panel-header script-header">
                        <h3>📜 脚本</h3>
                        <small>支持宏命令</small>
                    </div>
                    <form action="/script/run" method="POST" id="script-form">
                        <textarea name="script" id="script-area" spellcheck="false" placeholder="# 按A键&#10;a&#10;# 等待1秒&#10;wait 1000&#10;# 左摇杆推左&#10;ls left,100">{{script}}</textarea>
                        <div class="script-actions">
                            <button type="button" id="script-toggle-btn" onclick="toggleScript()" class="btn btn-accent btn-sm btn-flex">▶ 运行</button>
                            <button type="button" onclick="document.getElementById('script-area').value=''" class="btn btn-sm">🗑</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <footer>
            &copy; 2020-2026 RasCon - Python 3.11+ 适配版 | Amiibo 库集成版
        </footer>
    </div>
    
    <!-- Toast 消息 -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== UI / Layout Logic ====================
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen-active');
        }

        function switchAmiiboTab(tab) {
            // Update Tab Buttons
            document.querySelectorAll('.amiibo-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            // Update Views
            document.getElementById('amiibo-library-view').style.display = 'none';
            document.getElementById('amiibo-subscription-view').style.display = 'none';
            
            if (tab === 'library') {
                document.getElementById('amiibo-library-view').style.display = 'flex';
            } else {
                document.getElementById('amiibo-subscription-view').style.display = 'flex';
                // Auto-load last repo if field is empty
                const lastRepo = localStorage.getItem('last_amiibo_repo');
                const input = document.getElementById('repo-url-input');
                if (lastRepo && !input.value) {
                    input.value = lastRepo;
                }
            }
        }

        // ==================== Script Logic ====================
        let isScriptRunning = false;
        
        async function toggleScript() {
            if (isScriptRunning) {
                await stopScript();
            } else {
                await runScript();
            }
        }
        
        function updateScriptButton() {
            const btn = document.getElementById('script-toggle-btn');
            if (!btn) return;
            
            if (isScriptRunning) {
                btn.innerHTML = '⏹ 停止';
                btn.className = 'btn btn-danger btn-sm btn-flex';
            } else {
                btn.innerHTML = '▶ 运行';
                btn.className = 'btn btn-accent btn-sm btn-flex';
            }
        }
        
        async function runScript() {
            const script = document.getElementById('script-area').value;
            if(!script.trim()) return;
            
            try {
                const res = await fetch('/script/run', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: 'script=' + encodeURIComponent(script)
                });
                const data = await res.json();
                if(data.success) {
                    isScriptRunning = true;
                    updateScriptButton();
                    showToast('脚本开始运行', 'success');
                } else {
                    showToast('运行失败: ' + data.error, 'error');
                }
            } catch(e) { showToast('请求失败', 'error'); }
        }

        async function stopScript() {
            try {
                await fetch('/script/stop', { 
                    method: 'POST',
                    headers: {'X-Requested-With': 'XMLHttpRequest'}
                });
                isScriptRunning = false;
                updateScriptButton();
                showToast('脚本已停止', 'info');
            } catch(e) {}
        }

        // ==================== Subscription Logic ====================


        async function fetchRepoTree() {
            const repoInput = document.getElementById('repo-url-input');
            const repo = repoInput.value.trim();
            if(!repo) { 
                showToast('请输入仓库地址', 'error');
                return;
            }
            
            const contentDiv = document.getElementById('repo-content');
            contentDiv.innerHTML = '<div class="empty-state" style="padding:20px; text-align:center;">正在从 GitHub API 获取文件列表...</div>';
            
            try {
                const res = await fetch('/api/amiibo/subscription', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({repo})
                });
                const data = await res.json();
                
                if(data.success) {
                    localStorage.setItem('last_amiibo_repo', data.repo); // Save successful repo
                    renderRepoFiles(data.files);
                } else {
                    contentDiv.innerHTML = `<div class="error-state" style="text-align:center; padding:20px;">${data.error}</div>`;
                }
            } catch(e) {
                contentDiv.innerHTML = `<div class="error-state" style="text-align:center; padding:20px;">网络错误: ${e.message}</div>`;
            }
        }

        function renderRepoFiles(files) {
             const contentDiv = document.getElementById('repo-content');
             if(!files || files.length === 0) {
                 contentDiv.innerHTML = '<div class="empty-state" style="padding:20px; text-align:center;">该仓库未找到 .bin 文件</div>';
                 return;
             }
             
             // 简单的按路径显示
             contentDiv.innerHTML = files.map(f => {
                const displayName = f.name;
                const pathParts = f.path.split('/');
                const displayPath = pathParts.length > 1 ? pathParts.slice(0, -1).join('/') : 'Root';
                
                return `
                <div style="display:flex; align-items:center; padding:10px; border-bottom:1px solid var(--border-color); font-size:13px; background:var(--bg-tertiary); border-radius:6px; margin-bottom:4px;">
                    <div style="margin-right:12px; font-size:16px;">📄</div>
                    <div style="flex:1; overflow:hidden;">
                        <div style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;" title="${f.name}">${displayName}</div>
                        <div style="color:var(--text-muted); font-size:11px; margin-top:2px;">${displayPath} · ${(f.size/1024).toFixed(1)} KB</div>
                    </div>
                    <button onclick="downloadRepoFile('${f.url}', '${f.name}')" class="btn btn-sm btn-accent" style="padding:4px 12px; margin-left:8px;">⬇ 下载</button>
                </div>
             `}).join('');
        }

        async function downloadRepoFile(url, name) {
            if(!confirm(`确认下载 ${name}?`)) return;
            
            showToast(`正在下载 ${name}...`, 'info');
            try {
                const res = await fetch('/api/amiibo/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: url, name: name})
                });
                const data = await res.json();
                if(data.success) {
                    showToast('下载成功！已添加到库', 'success');
                    // closeSubscriptionModal(); // Keeping it open is better
                    refreshAmiiboList(); // 刷新背景的主列表
                } else {
                    showToast(`下载失败: ${data.error}`, 'error');
                }
            } catch(e) {
                showToast(`请求失败: ${e.message}`, 'error');
            }
        }

        // ==================== Amiibo 库管理 ====================
        
        let allAmiibos = [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initControllerButtons();
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);
            
            // 加载 Amiibo 库
            refreshAmiiboList();
            
            // 定期更新状态
            setInterval(updateStatus, 3000);
        });
        
        // 刷新 Amiibo 列表 (简单版)
        async function refreshAmiiboList() {
            try {
                // 如果是第一次加载，或者显式请求刷新
                // 推荐：每次打开时如果列表为空，或者没有元数据，可以提示用户是否更新
                // 但这里我们直接拉取后端列表，后端会尝试从本地缓存填充元数据
                const response = await fetch('/api/amiibo/list');
                const data = await response.json();
                
                if (data.success) {
                    allAmiibos = data.amiibos;
                    renderAmiiboList(allAmiibos);
                }
            } catch (error) {
                console.error('加载 Amiibo 列表失败:', error);
                showToast('加载列表失败', 'error');
            }
        }
        
        async function updateAmiiboDatabase() {
            if (!confirm('是否从 AmiiboAPI 下载最新的 Amiibo 数据库并匹配本地文件？\n这需要联网，可能花费几秒钟。')) return;
            
            showToast('正在下载 Amiibo 数据库...', 'info');
            try {
                // 更新数据库源
                const resSource = await fetch('/api/amiibo/updatesource', { method: 'POST' });
                const dataSource = await resSource.json();
                
                if (!dataSource.success) {
                    throw new Error(dataSource.error || '下载数据库失败');
                }
                
                showToast(`数据库更新成功，正在刷新 ${allAmiibos.length} 个文件的元数据...`, 'info');

                // 刷新本地元数据
                const resMeta = await fetch('/api/amiibo/refresh_metadata', { method: 'POST' });
                const dataMeta = await resMeta.json();
                
                if (dataMeta.success) {
                    showToast(`全部完成！已更新 ${dataMeta.updated} 个 Amiibo 的图片和信息。`, 'success');
                    refreshAmiiboList(); // 重新加载列表显示新数据
                } else {
                    throw new Error(dataMeta.error || '匹配元数据时出错');
                }
            } catch (error) {
                console.error(error);
                showToast(`更新失败: ${error.message}`, 'error');
            }
        }

        // 搜索 Amiibo
        function searchAmiibo(query) {
            if (!query) {
                renderAmiiboList(allAmiibos);
                return;
            }
            
            const q = query.toLowerCase();
            const filtered = allAmiibos.filter(a => 
                a.filename.toLowerCase().includes(q) ||
                (a.custom_name || '').toLowerCase().includes(q)
            );
            
            renderAmiiboList(filtered);
        }
        
        let isGroupMode = true; // 默认开启分组模式

        function toggleGroupMode() {
            isGroupMode = !isGroupMode;
            const btn = document.getElementById('btn-group-mode');
            if (btn) {
                btn.style.color = isGroupMode ? 'var(--accent-primary)' : '';
                btn.style.borderColor = isGroupMode ? 'var(--accent-primary)' : '';
            }
            renderAmiiboList(currentFilteredAmiibos || allAmiibos);
        }

        let currentFilteredAmiibos = null;

        // 渲染 Amiibo 列表 (Smart Grouped List)
        function renderAmiiboList(amiibos) {
            currentFilteredAmiibos = amiibos;
            const list = document.getElementById('amiibo-list');
            if (!list) return;
            
            if (!amiibos || amiibos.length === 0) {
                list.innerHTML = `<div class="empty-state">
                    <div style="font-size:24px; margin-bottom:10px; opacity:0.5;">📦</div>
                    <div>暂无 Amiibo 文件</div>
                    <div style="font-size:11px; margin-top:5px; color:var(--text-muted);">点击上方 "上传" 添加 .bin 文件</div>
                </div>`;
                return;
            }

            const renderItem = (a) => {
                const rawName = a.filename.replace(/\.bin$/i, '');
                const displayName = a.custom_name || rawName;
                const char = (a.character ? a.character.charAt(0) : displayName.charAt(0)).toUpperCase();
                
                // 元数据
                let meta = [];
                if (!isGroupMode && a.series) meta.push(a.series); // 分组模式下元数据不显示系列
                if (a.game_series && a.game_series !== a.series) meta.push(a.game_series);
                if (meta.length === 0) meta.push((a.size / 1024).toFixed(1) + ' KB');

                // 颜色
                const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db', '#9b59b6', '#34495e', '#16a085', '#d35400', '#c0392b'];
                let hash = 0;
                for (let i = 0; i < rawName.length; i++) hash = rawName.charCodeAt(i) + ((hash << 5) - hash);
                const color = colors[Math.abs(hash) % colors.length];
                
                // 状态标记
                const hasBackup = a.has_origin; 
                
                // 图片处理
                let iconHtml = `<div class="amiibo-icon" style="background:${color}1a; color:${color}; border-color:${color}33;">${char}</div>`;
                if (a.image_url) {
                    // 使用 object-fit: contain 显示完整图片
                    iconHtml = `<div class="amiibo-icon" style="background:transparent; border:none; padding:0; overflow:hidden;">
                         <img src="${a.image_url}" style="width:100%; height:100%; object-fit:contain;" alt="${displayName}" loading="lazy">
                    </div>`;
                }

                return `
                <div class="amiibo-item" data-filename="${a.filename}" onclick="selectAmiibo('${a.filename}')">
                    ${iconHtml}
                    <div class="amiibo-info">
                        <div class="name" title="${a.filename}">
                            ${displayName}
                            ${hasBackup ? '<span style="color:var(--info); font-size:10px; margin-left:4px;" title="有原始备份">↺</span>' : ''}
                        </div>
                        <div class="meta" title="${meta.join(' · ')}">${meta.join(' · ')}</div>
                    </div>
                    <div class="amiibo-actions">
                        ${hasBackup ? `
                        <button class="btn-restore" onclick="event.stopPropagation(); restoreAmiibo('${a.filename}')" title="重置数据">
                            ↺
                        </button>` : ''}
                        <button class="btn-scan" onclick="event.stopPropagation(); scanAmiibo('${a.filename}')" title="立即使用">
                            ⚡
                        </button>
                        <button class="btn-delete" onclick="event.stopPropagation(); deleteAmiibo('${a.filename}')" title="删除">
                            🗑
                        </button>
                    </div>
                </div>`;
            };
            
            // 确保 list 是清空的
            list.innerHTML = '';

            // 根据是否分组来渲染内容
            if (isGroupMode) {
                // 分组逻辑
                const groups = {};
                
                // 数据预处理：没有系列信息的归为 "未分类"
                amiibos.forEach(a => {
                    const groupName = a.series || '未分类';
                    if (!groups[groupName]) groups[groupName] = [];
                    groups[groupName].push(a);
                });

                // 按组名排序
                const sortedGroups = Object.keys(groups).sort((a, b) => {
                    if (a === '未分类') return 1;
                    if (b === '未分类') return -1;
                    return a.localeCompare(b, 'zh-CN');
                });

                // 渲染每个分组
                list.innerHTML = sortedGroups.map(gName => `
                    <div class="group-header" style="position:sticky; top:0; background:var(--bg-secondary); padding:6px 8px; z-index:10; border-bottom:1px solid var(--border-color); margin-bottom:4px; font-size:11px; font-weight:bold; color:var(--text-muted); display:flex; align-items:center; border-radius:4px;">
                        <span style="margin-right:6px;">📂</span> ${gName} <span style="margin-left:auto; font-weight:normal; opacity:0.7; background:var(--bg-card); padding:1px 6px; border-radius:10px; font-size:10px;">${groups[gName].length}</span>
                    </div>
                    <div class="group-items" style="margin-bottom:8px;">
                        ${groups[gName].map(renderItem).join('')}
                    </div>
                `).join('');
            } else {
                // 扁平列表
                list.innerHTML = amiibos.map(renderItem).join('');
            }
        }

        // 选中 Amiibo
        let selectedAmiibo = null;
        function selectAmiibo(filename) {
            selectedAmiibo = filename;
            document.querySelectorAll('.amiibo-item').forEach(el => {
                if (el.getAttribute('data-filename') === filename) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }
        
        // 扫描/使用 Amiibo
        async function scanAmiibo(filename) {
            try {
                const response = await fetch('/api/amiibo/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`正在扫描 ${filename}`, 'success');
                    updateCurrentAmiibo(filename);
                } else {
                    showToast(data.error || '扫描失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }
        
        // 恢复 Amiibo
        async function restoreAmiibo(filename) {
            if (!confirm(`确定要将 ${filename} 恢复到原始状态吗？`)) return;
            
            try {
                const response = await fetch('/api/amiibo/restore', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('已恢复到原始状态', 'success');
                } else {
                    showToast(data.error || '恢复失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }
        
        // 删除 Amiibo
        async function deleteAmiibo(filename) {
            if (!confirm(`确定要删除 ${filename} 吗？`)) return;
            
            const removeOrigin = confirm('是否同时删除原始备份？');
            
            try {
                const response = await fetch('/api/amiibo/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename, remove_origin: removeOrigin })
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('已删除', 'success');
                    refreshAmiiboList();
                } else {
                    showToast(data.error || '删除失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }
        
        // 上传 Amiibo
        async function uploadAmiibo() {
            const fileInput = document.getElementById('amiibo-file');
            const files = fileInput.files;
            
            if (files.length === 0) {
                showToast('请选择文件', 'info');
                return;
            }
            
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                
                try {
                    const response = await fetch('/api/amiibo/add', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        showToast(`${file.name} 上传成功`, 'success');
                    } else {
                        showToast(`${file.name}: ${data.error}`, 'error');
                    }
                } catch (error) {
                    showToast(`${file.name} 上传失败`, 'error');
                }
            }
            
            fileInput.value = '';
            refreshAmiiboList();
        }
        
        // 更新当前 Amiibo 状态
        function updateCurrentAmiibo(filename) {
            const status = document.getElementById('current-amiibo-status');
            const name = document.getElementById('current-amiibo-name');
            
            if (filename) {
                status.classList.remove('hide');
                name.textContent = filename;
            } else {
                status.classList.add('hide');
            }
        }
        
        // 移除当前 Amiibo
        async function removeCurrentAmiibo() {
            try {
                await fetch('/api/btn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'push', button: 'amiibo remove' })
                });
                updateCurrentAmiibo(null);
                showToast('已移除 Amiibo', 'success');
            } catch (error) {
                showToast('移除失败', 'error');
            }
        }
        
        // ==================== Toast 消息 ====================
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // ==================== 按键长按和键盘快捷键支持 ====================
        
        // 键盘映射配置
        const keyMap = {
            // WASD -> 左摇杆
            'KeyW': { type: 'stick', stick: 'ls', direction: 'up' },
            'KeyA': { type: 'stick', stick: 'ls', direction: 'left' },
            'KeyS': { type: 'stick', stick: 'ls', direction: 'down' },
            'KeyD': { type: 'stick', stick: 'ls', direction: 'right' },
            // 方向键 -> 右摇杆
            'ArrowUp': { type: 'stick', stick: 'rs', direction: 'up' },
            'ArrowLeft': { type: 'stick', stick: 'rs', direction: 'left' },
            'ArrowDown': { type: 'stick', stick: 'rs', direction: 'down' },
            'ArrowRight': { type: 'stick', stick: 'rs', direction: 'right' },
            // 常用按键
            'Space': { type: 'button', button: 'a' },
            'Enter': { type: 'button', button: 'b' },
            'KeyQ': { type: 'button', button: 'l' },
            'KeyE': { type: 'button', button: 'r' },
            'KeyZ': { type: 'button', button: 'zl' },
            'KeyC': { type: 'button', button: 'zr' },
            'KeyX': { type: 'button', button: 'x' },
            'KeyY': { type: 'button', button: 'y' },
            'KeyH': { type: 'button', button: 'home' },
            'KeyP': { type: 'button', button: 'plus' },
            'KeyM': { type: 'button', button: 'minus' },
            'KeyK': { type: 'button', button: 'capture' },
            // 十字键 (Shift + 方向键)
            'ShiftArrowUp': { type: 'button', button: 'up' },
            'ShiftArrowDown': { type: 'button', button: 'down' },
            'ShiftArrowLeft': { type: 'button', button: 'left' },
            'ShiftArrowRight': { type: 'button', button: 'right' },
        };

        // 当前按下的键
        const pressedKeys = new Set();
        
        // 发送按键命令
        async function sendButton(action, button) {
            try {
                const response = await fetch('/api/btn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, button: button })
                });
                const data = await response.json();
                if (!data.success) {
                    console.error('按键命令失败:', data.error);
                }
            } catch (error) {
                console.error('网络错误:', error);
            }
        }

        // 处理鼠标/触摸按下
        function handleButtonPress(button, buttonValue) {
            button.classList.add('pressed');
            sendButton('press', buttonValue);
        }

        // 处理鼠标/触摸释放
        function handleButtonRelease(button, buttonValue) {
            button.classList.remove('pressed');
            sendButton('release', buttonValue);
        }

        // 初始化控制器按钮
        function initControllerButtons() {
            const buttons = document.querySelectorAll('.controller-grid button[data-btn]');
            
            buttons.forEach(button => {
                const btnValue = button.getAttribute('data-btn');
                if (!btnValue) return;

                // 鼠标事件
                button.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    handleButtonPress(button, btnValue);
                });

                button.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    handleButtonRelease(button, btnValue);
                });

                button.addEventListener('mouseleave', (e) => {
                    if (button.classList.contains('pressed')) {
                        handleButtonRelease(button, btnValue);
                    }
                });

                // 触摸事件 (移动设备)
                button.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleButtonPress(button, btnValue);
                });

                button.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    handleButtonRelease(button, btnValue);
                });
            });
        }

        // 键盘事件处理
        function handleKeyDown(e) {
            // 如果在输入框中，不处理快捷键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const keyCode = (e.shiftKey ? 'Shift' : '') + e.code;
            const mapping = keyMap[keyCode] || keyMap[e.code];
            
            if (mapping && !pressedKeys.has(keyCode)) {
                e.preventDefault();
                pressedKeys.add(keyCode);
                
                if (mapping.type === 'button') {
                    sendButton('press', mapping.button);
                    highlightButton(mapping.button, true);
                } else if (mapping.type === 'stick') {
                    sendButton('press', `${mapping.stick} ${mapping.direction}`);
                    highlightStick(mapping.stick, mapping.direction, true);
                }
            }
        }

        function handleKeyUp(e) {
            const keyCode = (e.shiftKey ? 'Shift' : '') + e.code;
            const mapping = keyMap[keyCode] || keyMap[e.code];
            
            // 检查所有可能的键码
            [keyCode, e.code, 'Shift' + e.code].forEach(code => {
                if (pressedKeys.has(code)) {
                    pressedKeys.delete(code);
                    const m = keyMap[code];
                    if (m) {
                        if (m.type === 'button') {
                            sendButton('release', m.button);
                            highlightButton(m.button, false);
                        } else if (m.type === 'stick') {
                            sendButton('release', `${m.stick} ${m.direction}`);
                            highlightStick(m.stick, m.direction, false);
                        }
                    }
                }
            });
        }

        // 高亮按钮
        function highlightButton(buttonName, active) {
            const btn = document.querySelector(`button[data-btn="${buttonName}"]`);
            if (btn) {
                if (active) {
                    btn.classList.add('pressed');
                } else {
                    btn.classList.remove('pressed');
                }
            }
        }

        // 高亮摇杆
        function highlightStick(stick, direction, active) {
            const btn = document.querySelector(`button[data-btn="${stick} ${direction},100"]`);
            if (btn) {
                if (active) {
                    btn.classList.add('pressed');
                } else {
                    btn.classList.remove('pressed');
                }
            }
        }


        // 状态更新
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                if (data.success) {
                    const statusDot = document.getElementById('status-dot');
                    const statusText = document.getElementById('status-text');
                    const statusMessage = document.getElementById('status-message');
                    
                    if (statusDot) {
                        if (data.connected) {
                            statusDot.classList.add('connected');
                        } else {
                            statusDot.classList.remove('connected');
                        }
                    }
                    
                    if (statusText) {
                        statusText.textContent = data.connected ? '已连接' : '未连接';
                    }
                    
                    if (statusMessage && data.joycontrol_message) {
                        statusMessage.textContent = data.joycontrol_message;
                    }
                    
                    // 更新当前 Amiibo 状态
                    if (data.current_amiibo) {
                        updateCurrentAmiibo(data.current_amiibo);
                    }
                }
            } catch (error) {
                console.error('状态更新失败:', error);
            }
        }
    </script>
</body>
</html>
